<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctorum Admin</title>
    <link rel="stylesheet" href="/Sanctorum/admin-style.css">
</head>
<body>

    <div class="admin-card">
        <h2>Nuevo Registro</h2>
        <div id="info-id" class="status-bar">Detectando base de datos...</div>

        <div class="row">
            <div class="field" style="flex: 0 0 80px;">
                <label>ID:</label>
                <input type="text" id="id-final" class="id-input" readonly>
            </div>
            <div class="field">
                <label>Nombre del Santo:</label>
                <input type="text" id="n" placeholder="Ej: San Judas Tadeo">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Nacimiento:</label>
                <input type="text" id="nac" placeholder="Año o Siglo">
            </div>
            <div class="field">
                <label>Fallecimiento:</label>
                <input type="text" id="fall" placeholder="Año o Siglo">
            </div>
        </div>

        <div class="row">
            <div class="field">
                <label>Biografía / Descripción:</label>
                <textarea id="d" rows="8" placeholder="Escribe aquí la historia detallada..."></textarea>
            </div>
        </div>

        <button onclick="gen()">Generar JSON</button>

        <div id="res" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <p style="color:var(--accent); font-size:0.8rem; margin:0;">Copia esto en <b>/data/<span id="file-name"></span></b>:</p>
                <button onclick="copiarJSON()" id="btn-copy" style="width: auto; padding: 5px 15px; font-size: 0.7rem; margin: 0;">Copiar Código</button>
            </div>
            
            <pre id="out"></pre>
            
            <p style="color:var(--gold); font-size:0.8rem; margin-top:10px;">
                Recuerda actualizar 'libs' a <b id="next-lib"></b> en config.js
            </p>
        </div>
    </div>

    <script src="/Sanctorum/config.js"></script>
    <script>
        window.onload = () => {
            if (typeof libs !== 'undefined') {
                const next = libs + 1;
                document.getElementById('id-final').value = next;
                document.getElementById('info-id').innerText = `REGISTROS: ${libs} | PRÓXIMO: ${next}`;
            } else {
                document.getElementById('info-id').innerText = "ERROR: config.js no encontrado";
            }
        };

        function gen() {
            const id = document.getElementById('id-final').value;
            const payload = {
                nombre: document.getElementById('n').value,
                nacimiento: document.getElementById('nac').value,
                fallecimiento: document.getElementById('fall').value,
                descripcion: document.getElementById('d').value
            };
            document.getElementById('out').innerText = JSON.stringify(payload, null, 4);
            document.getElementById('file-name').innerText = id + ".json";
            document.getElementById('next-lib').innerText = id;
            document.getElementById('res').style.display = 'block';
            
            // Resetear el botón de copiar si se genera uno nuevo
            const btn = document.getElementById('btn-copy');
            btn.innerText = "Copiar Código";
            btn.style.background = "var(--accent)";
        }

        async function copiarJSON() {
            const texto = document.getElementById('out').innerText;
            const btn = document.getElementById('btn-copy');
            
            try {
                await navigator.clipboard.writeText(texto);
                btn.innerText = "¡Copiado!";
                btn.style.background = "#00ff88"; // Cambio de color a verde éxito
                
                // Regresar a la normalidad después de 2 segundos
                setTimeout(() => {
                    btn.innerText = "Copiar Código";
                    btn.style.background = "var(--accent)";
                }, 2000);
            } catch (err) {
                alert("Error al copiar. Por favor, selecciona el texto manualmente.");
            }
        }
    </script>
</body>
</html>
