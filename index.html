<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANCTORUM | Archivo Digital Católico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="menu-santos">
    <div class="header-menu">
        <h2>SANCTORUM</h2>
    </div>
    <div id="lista-items">
        </div>
</nav>

<main>
    <div id="visor" class="card" style="display: none;">
        <img id="img-view" class="main-img">
        <h1 id="nombre-view"></h1>
        <span class="dates" id="fechas-view"></span>
        <div class="desc" id="desc-view"></div>
    </div>
    
    <div id="placeholder" style="align-self: center; text-align: center; opacity: 0.3;">
        <p style="letter-spacing: 5px;">SELECCIONE UN REGISTRO</p>
    </div>
</main>

<script src="config.js"></script>
<script>
    async function detectarImagen(id) {
        const extensiones = ['png', 'jpg', 'jpeg', 'webp', 'gif'];
        for (let ext of extensiones) {
            let ruta = `./imgs/${id}.${ext}`;
            try {
                let respuesta = await fetch(ruta, { method: 'HEAD' });
                if (respuesta.ok) return ruta;
            } catch (e) {}
        }
        return null;
    }

    async function cargarMenu() {
        const lista = document.getElementById('lista-items');
        
        for (let i = 1; i <= libs; i++) {
            try {
                const res = await fetch(`./data/${i}.json`);
                if (!res.ok) continue;
                
                const datos = await res.json();
                const rutaImg = await detectarImagen(i);

                const div = document.createElement('div');
                div.className = 'item-menu';
                div.innerHTML = `
                    <img src="${rutaImg || 'https://via.placeholder.com/150'}" class="img-mini">
                    <div>
                        <div style="color:white; font-weight:bold; font-size: 0.9rem;">${datos.nombre}</div>
                        <small style="color:var(--accent); opacity:0.7">ID: #${i}</small>
                    </div>
                `;
                
                div.onclick = () => mostrarDetalle(datos, rutaImg);
                lista.appendChild(div);
            } catch (err) {
                console.warn(`No se pudo cargar el ID ${i}`);
            }
        }
    }

    function mostrarDetalle(datos, img) {
        document.getElementById('placeholder').style.display = 'none';
        const visor = document.getElementById('visor');
        visor.style.display = 'block';
        
        document.getElementById('nombre-view').innerText = datos.nombre;
        document.getElementById('fechas-view').innerText = `${datos.nacimiento} — ${datos.fallecimiento}`;
        document.getElementById('desc-view').innerText = datos.descripcion;
        
        const imgEl = document.getElementById('img-view');
        if (img) {
            imgEl.src = img;
            imgEl.style.display = 'block';
        } else {
            imgEl.style.display = 'none';
        }
        
        document.querySelector('main').scrollTop = 0;
    }

    window.onload = cargarMenu;
</script>
</body>
</html>
