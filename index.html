<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANCTORUM | Archivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="menu-santos">
    <div class="header-menu"><h2>SANCTORUM</h2></div>
    <div id="lista-items"></div>
</nav>

<main>
    <div id="visor" class="card" style="display: none;">
        <img id="img-view" class="main-img">
        <h1 id="nombre-view"></h1>
        <span class="dates" id="fechas-view"></span>
        <div class="desc" id="desc-view"></div>
    </div>
    <div id="placeholder" style="margin-top: 20vh; opacity: 0.4; text-align: center;">
        <p>SELECCIONE UN REGISTRO</p>
    </div>
</main>

<script src="config.js"></script>
<script>
    async function getImg(id) {
        const ext = ['png', 'jpg', 'jpeg', 'webp'];
        for (let e of ext) {
            let path = `./imgs/${id}.${e}`;
            try {
                let res = await fetch(path, { method: 'HEAD' });
                if (res.ok) return path;
            } catch (err) {}
        }
        return null;
    }

    // Función para cambiar de santo y actualizar la URL sin recargar
    async function seleccionarSanto(id, pushState = true) {
        try {
            const res = await fetch(`./data/${id}.json`);
            if (!res.ok) return;
            const data = await res.json();
            const img = await getImg(id);

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('visor').style.display = 'block';
            document.getElementById('nombre-view').innerText = data.nombre;
            document.getElementById('fechas-view').innerText = `${data.nacimiento} — ${data.fallecimiento}`;
            document.getElementById('desc-view').innerText = data.descripcion;
            document.getElementById('img-view').src = img || '';

            // Actualizar URL (?p=ID)
            if (pushState) {
                const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?p=${id}`;
                window.history.pushState({path:newurl}, '', newurl);
            }
        } catch (e) { console.error("Error al cargar datos"); }
    }

    async function init() {
        const list = document.getElementById('lista-items');
        
        // Cargar menú
        for (let i = 1; i <= libs; i++) {
            const res = await fetch(`./data/${i}.json`);
            if (!res.ok) continue;
            const data = await res.json();
            const img = await getImg(i);

            const item = document.createElement('div');
            item.className = 'item-menu';
            item.innerHTML = `<img src="${img || ''}" class="img-mini"><span>${data.nombre}</span>`;
            item.onclick = () => seleccionarSanto(i);
            list.appendChild(item);
        }

        // REVISAR URL AL CARGAR (?p=X)
        const params = new URLSearchParams(window.location.search);
        const p = params.get('p');
        if (p && parseInt(p) <= libs) {
            seleccionarSanto(p, false);
        }
    }

    window.onload = init;
</script>
</body>
</html>
